# Models under test -> Apple Silicon (MacBook Air M4), mlx-lm, 4-bit.
# Run: python -m src.run_eval --backend mlx --models <ids...> --device m4
# Model ids are mlx-community 4-bit conversions (download on first use).
backend: mlx
device: m4
precision: 4bit
models:
  - id: mlx-community/Llama-3.2-1B-Instruct-4bit
    family: llama
    params_b: 1.0
  - id: mlx-community/Qwen2.5-1.5B-Instruct-4bit
    family: qwen
    params_b: 1.5
  - id: mlx-community/gemma-2-2b-it-4bit
    family: gemma
    params_b: 2.0
  - id: mlx-community/Llama-3.2-3B-Instruct-4bit
    family: llama
    params_b: 3.0
  - id: mlx-community/Qwen2.5-3B-Instruct-4bit
    family: qwen
    params_b: 3.0
